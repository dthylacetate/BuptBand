#\u57FA\u672C\u914D\u7F6E
spring.application.name=BuptBand
server.port=8080

# H2\u6570\u636E\u5E93\u76F8\u5173\u914D\u7F6E
# \u8FD9\u91CC\u7684 ./data/buptband \u8868\u793A\u6570\u636E\u5E93\u6587\u4EF6\u4F1A\u751F\u6210\u5728\u9879\u76EE\u6839\u76EE\u5F55\u7684 data \u6587\u4EF6\u5939\u4E0B

spring.datasource.url=jdbc:h2:file:./data/buptband;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA/Hibernate \u884C\u4E3A\u914D\u7F6E
# update \u8868\u793A\uFF1A\u5982\u679C\u5728 Java \u91CC\u52A0\u4E86\u65B0\u5B57\u6BB5\uFF0C\u542F\u52A8\u65F6\u4F1A\u81EA\u52A8\u66F4\u65B0\u6570\u636E\u5E93\u8868\u7ED3\u6784

spring.jpa.hibernate.ddl-auto=update
# \u5728\u63A7\u5236\u53F0\u6253\u5370\u51FA\u7A0B\u5E8F\u8FD0\u884C\u65F6\u7684 SQL \u8BED\u53E5\u65B9\u4FBF\u8C03\u8BD5
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2\u63A7\u5236\u53F0\u914D\u7F6E
spring.h2.console.enabled=true
# \u8BBF\u95EE\u8DEF\u5F84\uFF1Ahttp://localhost:8080/h2-console
spring.h2.console.path=/h2-console
# \u5141\u8BB8\u975E\u672C\u5730\u8FDE\u63A5
spring.h2.console.settings.web-allow-others=true

# \u5F3A\u5236\u54CD\u5E94\u4F7F\u7528 UTF-8 \u7F16\u7801
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true

