# \u914D\u7F6E SpringDoc \u626B\u63CF\u7684\u5305\u8DEF\u5F84\uFF08\u6539\u6210\u4F60\u81EA\u5DF1\u7684\u5305\u540D\uFF09
springdoc.packages-to-scan=com.bupt.BuptBand.controller

# \u89E3\u51B3 Spring Boot 3 \u7684\u8DEF\u5F84\u5339\u914D\u7B56\u7565\u95EE\u9898
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# \u5F00\u542F Knife4j
knife4j.enable=true
# \u5F00\u542F OpenAPI3
knife4j.openapi.enabled=true
springdoc.api-docs.path=/v3/api-docs
